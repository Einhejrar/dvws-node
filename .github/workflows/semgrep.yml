name: Semgrep

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  semgrep:
    name: Run Semgrep
    runs-on: ubuntu-latest

    container:
      image: returntocorp/semgrep

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep ci